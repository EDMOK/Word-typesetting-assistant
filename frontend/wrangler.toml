# Cloudflare Pages 配置
# https://developers.cloudflare.com/pages/

# 项目名称
name = "word-typesetting-assistant"

# 兼容模式
compatibility_date = "2024-01-01"

# 构建命令和输出目录
[build]
command = "npm run build"
cwd = "frontend"
watch_dir = "frontend/src"

# 环境变量
[vars]
VITE_API_BASE_URL = "https://word-typesetting-assistant.onrender.com"

# 生产环境
[env.production]
name = "word-typesetting-assistant"

# 预览环境
[env.preview]
name = "word-typesetting-assistant-preview"
